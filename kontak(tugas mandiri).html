<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Pribadi - Kontak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <header>
        <h1>Hubungi Kami</h1>
    </header>

    
    <nav>
        <ul>
            <li><a href="index(tugas mandiri).html">Beranda</a></li>
            <li><a href="kontak(tugas mandiri).html">Kontak Kami</a></li>
        </ul>
    </nav>

    
    <main>
        <section>
            <h2>Formulir Aspirasi & Pesan</h2>
            <form action="#" method="POST">
                
                <div>
                    <label for="nama">Nama Lengkap:</label><br>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda" required>
                </div>
                <br>

                
                <div>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" placeholder="nama@email.com" required>
                </div>
                <br>

                
                <div>
                    <label for="pesan">Pesan / Saran:</label><br>
                    <textarea id="pesan" name="pesan" rows="5" cols="40" placeholder="Tuliskan pesan atau saran Anda di sini..." required></textarea>
                </div>
                <br>

                
                <button type="submit">Kirim Pesan</button>
            </form>
        </section>
    </main>

    
    <footer>
        <hr>

    </footer>

</body>
</html>
